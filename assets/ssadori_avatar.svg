<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 원형 배경 (싸돌이 얼굴색) -->
  <circle cx="50" cy="50" r="48" fill="#B8E0F5" stroke="#000" stroke-width="2"/>
  
  <!-- 싸돌이 얼굴 (흰색 라인) -->
  <!-- 헬멧 링 -->
  <ellipse cx="50" cy="35" rx="28" ry="6" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  
  <!-- 헬멧 상단 -->
  <path d="M 22 35 Q 22 15 50 15 Q 78 15 78 35" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
  
  <!-- 눈 -->
  <line x1="42" y1="48" x2="42" y2="54" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="58" y1="48" x2="58" y2="54" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- 입 -->
  <path d="M 40 62 Q 50 67 60 62" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  
  <!-- X 표시 (왼쪽) -->
  <line x1="28" y1="42" x2="33" y2="47" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="33" y1="42" x2="28" y2="47" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  
  <!-- X 표시 (오른쪽) -->
  <line x1="67" y1="38" x2="72" y2="43" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="72" y1="38" x2="67" y2="43" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 행성 (오른쪽) -->
  <circle cx="70" cy="40" r="2.5" fill="#FFFFFF"/>
</svg>
